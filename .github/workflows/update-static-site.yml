name: Update static site data

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove projects section
        run: |
          node -e 'const fs=require("fs");for(const file of ["index.template.html","index.html"]){let html=fs.readFileSync(file,"utf8");html=html.replace(/\n\s*<li><a href="#work">Projeler<\/a><\/li>/g,"");html=html.replace(/href="#work"/g,"href=\"#services\"");html=html.replace(/Projeleri\s+İncele/g,"Hizmetleri İncele");const start=html.indexOf("    <section class=\"section-band work-band\"");const end=html.indexOf("    <section class=\"section-band services-band\"",start);if(start!==-1&&end!==-1){html=html.slice(0,start)+html.slice(end)}fs.writeFileSync(file,html,"utf8");}'

      - name: Rebuild static site
        run: node build-static.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Remove projects section from site"
          file_pattern: "index.html index.template.html cache/*.json"
