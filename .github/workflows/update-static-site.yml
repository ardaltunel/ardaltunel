name: Update static site data

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild static site
        run: node build-static.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update static site data"
          file_pattern: "index.html cache/*.json"
